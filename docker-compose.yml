services:
  mongodb:
    image: mongo:latest
    container_name: blog_mongodb
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: blogapi
      MONGO_INITDB_ROOT_PASSWORD: blogapi
    volumes:
      - mongodb_data:/data/db

  mongo_express:
    image: mongo-express:latest
    container_name: blog_mongo_express
    restart: always
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb # ✅ Must match the mongodb service name
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: blogapi
      ME_CONFIG_MONGODB_ADMINPASSWORD: blogapi
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

volumes:
  mongodb_data:
